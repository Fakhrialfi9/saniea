<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belajar Web Sederhana 1</title>
    <style>
      body {
        position: relative;
        display: flex;
        flex-direction: column;
        width: 100vw;
        max-width: 100vw;
        height: 100vh;
        max-height: 100vh;
        margin: 0 auto;
        padding: 0;
        justify-content: center;
        align-items: center;
        background-color:black;
      }
      .kotak{
        width: 10rem;
        height: 10rem;
        background-color: pink;
        position: relative;
      }
      .kotak2{
        width: 5rem;
        height: 5rem;
        background: purple;
        position: absolute;
        bottom: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <div class="kotak">
      <div class="kotak2">
      </div>
    </div>
  </body>
</html>
